<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amerige Heights Trap Map — Editor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2535;
    --border: #2a3047;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --text: #e8eaf0;
    --text-dim: #6b7494;
    --none-color: #40d080;
    --light-color: #f0c040;
    --medium-color: #f07030;
    --extreme-color: #e03040;
    --panel-w: 280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 52px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 1000;
  }
  .logo { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
  .logo span { color: var(--accent); }
  .mode-badge {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 4px;
    background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3);
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── Buttons ── */
  button {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    border: none; border-radius: 6px; padding: 7px 14px; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6fa0ff; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
  .btn-danger { background: rgba(224,48,64,0.15); color: var(--extreme-color); border: 1px solid rgba(224,48,64,0.3); }
  .btn-danger:hover { background: rgba(224,48,64,0.3); }
  .btn-success { background: rgba(40,200,100,0.15); color: #40d080; border: 1px solid rgba(40,200,100,0.3); }
  .btn-success:hover { background: rgba(40,200,100,0.3); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ── Layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--panel-w); background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
  }
  .trap-list { flex: 1; overflow-y: auto; padding: 8px; }
  .trap-list::-webkit-scrollbar { width: 4px; }
  .trap-list::-webkit-scrollbar-track { background: transparent; }
  .trap-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .trap-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: 6px; cursor: pointer; transition: background 0.1s; margin-bottom: 2px;
  }
  .trap-item:hover { background: var(--surface2); }
  .trap-item.selected { background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.3); }
  .trap-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .trap-id { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; flex: 1; }
  .trap-intensity { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); }

  /* Legend */
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-label { font-size: 12px; color: var(--text-dim); }

  /* Instructions */
  .tip { font-size: 11px; color: var(--text-dim); line-height: 1.6; }
  .tip strong { color: var(--text); }

  /* ── Map ── */
  #map { flex: 1; height: 100%; background: #0a0c12; }

  /* ── Loading overlay ── */
  .loading-overlay {
    position: absolute; inset: 0; background: rgba(10,12,18,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; flex-direction: column; gap: 14px;
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }

  /* ── Popup / Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 320px; transform: translateY(8px); transition: transform 0.2s;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .modal-field input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px;
    outline: none; transition: border-color 0.15s;
  }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-field input.error { border-color: var(--extreme-color); }
  .error-msg { font-size: 11px; color: var(--extreme-color); margin-top: 4px; display: none; }
  .error-msg.show { display: block; }
  .intensity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .intensity-btn {
    padding: 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-dim); font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    transition: all 0.15s; font-family: 'Syne', sans-serif; font-weight: 600;
  }
  .intensity-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .intensity-btn.active { color: #fff; }
  .intensity-btn[data-val="None"].active { background: var(--none-color); border-color: var(--none-color); }
  .intensity-btn[data-val="Light"].active { background: var(--light-color); border-color: var(--light-color); color: #111; }
  .intensity-btn[data-val="Moderate"].active { background: var(--medium-color); border-color: var(--medium-color); }
  .intensity-btn[data-val="Heavy"].active { background: var(--extreme-color); border-color: var(--extreme-color); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 9px; }

  /* Node popup on map */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 8px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 14px 16px !important; font-family: 'Syne', sans-serif; }
  .popup-id { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .popup-intensity { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .popup-actions { display: flex; gap: 6px; }
  .popup-actions button { font-size: 10px; padding: 5px 10px; }

  /* Status bar */
  .statusbar {
    height: 28px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0;
  }
  .status-item { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }
  .status-item span { color: var(--text); }

  /* Toast */
  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 18px; font-size: 13px; z-index: 9999; opacity: 0;
    transition: all 0.25s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #40d080; color: #40d080; }
  .toast.error { border-color: var(--extreme-color); color: var(--extreme-color); }

  /* Sync indicator */
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); display: inline-block; margin-right: 5px; }
  .sync-dot.ok { background: #40d080; }
  .sync-dot.err { background: var(--extreme-color); }
  .sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .config-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
    outline: none; transition: border-color 0.15s; margin-top: 6px;
  }
  .config-input:focus { border-color: var(--accent); }

  .dragging-cursor { cursor: grabbing !important; }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    header { padding: 0 12px; height: 44px; }
    .logo { font-size: 12px; }
    .header-actions button { font-size: 10px; padding: 5px 10px; }
    .statusbar { padding: 0 10px; gap: 10px; }
    .status-item { font-size: 9px; }
    .modal { width: calc(100vw - 32px); padding: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Amerige Heights <span>Trap Map</span></div>
  <div class="mode-badge">Edit Mode</div>
  <div class="header-actions">
    <button class="btn-success" id="btn-save-all">↑ Save Map</button>
    <button class="btn-ghost" onclick="window.open('view.html','_blank')">View Client Map ↗</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <!-- Sync status -->
    <div class="sidebar-section">
      <div style="display:flex;align-items:center;">
        <span class="sync-dot" id="sync-dot"></span>
        <span class="status-item" id="sync-status">Connecting…</span>
      </div>
    </div>


    <!-- Trap list -->
    <div class="sidebar-label" style="padding:12px 16px 4px;">Traps <span id="trap-count" style="color:var(--accent)">0</span></div>
    <div class="trap-list" id="trap-list"></div>

    <div style="padding:16px;margin-top:auto;">
      <img src="https://raw.githubusercontent.com/levialmanzar/TrapMap/main/Assets/Images/bug-bouncer-logo.png" style="width:100%;opacity:0.85;" />
    </div>
  </div>

  <div style="position:relative;flex:1;display:flex;flex-direction:column;">
    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading…</div>
    </div>
    <div id="map"></div>
  </div>
</div>

<div class="statusbar">
<div class="status-item">Last saved: <span id="sb-sync">—</span></div>
  <div class="status-item" id="sb-coords" style="margin-left:auto;">Click map to place trap</div>
</div>

<!-- Node Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">New Trap</h3>
    <div class="modal-field">
      <label>Trap ID (number)</label>
      <input type="number" id="modal-id" min="1" placeholder="e.g. 42" />
      <div class="error-msg" id="id-error">This ID already exists</div>
    </div>
    <div class="modal-field">
      <label>Activity Level</label>
      <div class="intensity-grid">
        <button class="intensity-btn active" data-val="None">None</button>
        <button class="intensity-btn" data-val="Light">Light</button>
        <button class="intensity-btn" data-val="Moderate">Moderate</button>
        <button class="intensity-btn" data-val="Heavy">Heavy</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn-danger" id="modal-delete" style="display:none">Delete</button>
      <button class="btn-danger" id="modal-delete-confirm" style="display:none">Confirm Delete</button>
      <button class="btn-primary" id="modal-save">Save Trap</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─────────────────────────────────────────────
// CONFIG & STATE
// ─────────────────────────────────────────────
const CONFIG_KEY = 'compoundmap_config';
const INTENSITY_COLORS = {
  None: '#40d080', Light: '#f0c040', Moderate: '#f07030', Heavy: '#e03040'
};

let nodes = [];
let markers = {};
let editingId = null;
let pendingLatLng = null;
const scriptUrl = 'https://script.google.com/macros/s/AKfycbyIwaoWbDzwdTkr4XpQBxb1vSeZ9x361JdAoxagH5Y6ZkaPcONfimDh4Yl179FOv_wuLw/exec';

function saveConfig() {}
function loadConfig() {}

// ─────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────
// We use CRS.Simple with a large imaginary bounds.
// Swap in your real image by changing IMG_URL and IMG_BOUNDS.
const IMG_URL = 'https://raw.githubusercontent.com/levialmanzar/TrapMap/main/Assets/Images/AMERIGE_HEIGHTS_COMMUNITY.jpg';
const IMG_W = 1625, IMG_H = 1042;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4,
  zoomSnap: 0.25,
});

const bounds = [[0,0],[IMG_H, IMG_W]];
L.imageOverlay(IMG_URL, bounds).addTo(map);
map.fitBounds(bounds);

// Click map to place node
map.on('click', function(e) {
  if (e.originalEvent._fromMarker) return;
  const { lat, lng } = e.latlng;
  if (lat < 0 || lat > IMG_H || lng < 0 || lng > IMG_W) return;
  pendingLatLng = e.latlng;
  editingId = null;
  openModal(null);
});

map.on('mousemove', function(e) {
  document.getElementById('sb-coords').textContent =
    `x: ${e.latlng.lng.toFixed(1)}  y: ${e.latlng.lat.toFixed(1)}`;
});

// ─────────────────────────────────────────────
// MARKERS
// ─────────────────────────────────────────────
// Sheet data may hold legacy numeric levels (0-3) or any casing
const INTENSITY_LEVELS = ['None', 'Light', 'Moderate', 'Heavy'];
const LEGACY_INTENSITY = { Medium: 'Moderate', Extreme: 'Heavy' };
function normalizeIntensity(val) {
  if (val === undefined || val === null || val === '') return 'None';
  const s = String(val).trim();
  if (INTENSITY_LEVELS[Number(s)] !== undefined && s !== '' && !isNaN(s)) return INTENSITY_LEVELS[Number(s)];
  const cap = s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
  if (LEGACY_INTENSITY[cap]) return LEGACY_INTENSITY[cap];
  return INTENSITY_LEVELS.includes(cap) ? cap : 'None';
}

function intensityColor(intensity) {
  return INTENSITY_COLORS[intensity] || INTENSITY_COLORS.None;
}

function makeIcon(node) {
  const color = intensityColor(node.intensity);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="15" fill="${color}" stroke="#fff" stroke-width="2.5" opacity="0.92"/>
    <text x="18" y="23" text-anchor="middle" font-size="12" font-weight="700" font-family="Syne,sans-serif" fill="#fff">${node.id}</text>
  </svg>`;
  return L.divIcon({
    html: svg, className: '', iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0,-20]
  });
}

function addMarker(node) {
  const marker = L.marker([node.lat, node.lng], {
    icon: makeIcon(node), draggable: true, autoPanOnFocus: false
  }).addTo(map);

  marker.on('click', function(e) {
    e.originalEvent._fromMarker = true;
    editingId = node.id;
    pendingLatLng = null;
    openModal(node);
  });

  marker.on('dragend', function(e) {
    const ll = e.target.getLatLng();
    const clampedLat = Math.max(0, Math.min(IMG_H, ll.lat));
    const clampedLng = Math.max(0, Math.min(IMG_W, ll.lng));
    if (clampedLat !== ll.lat || clampedLng !== ll.lng) {
      e.target.setLatLng([clampedLat, clampedLng]);
    }
    const currentId = Object.keys(markers).find(k => markers[k] === e.target);
    const n = nodes.find(x => x.id === parseInt(currentId));
    if (n) { n.lat = clampedLat; n.lng = clampedLng; pushNode(n); stampSaved(); toast(`Trap #${n.id} saved`, 'success'); }
  });

  markers[node.id] = marker;
}

function removeMarker(id) {
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
}

function refreshMarkerIcon(node) {
  if (markers[node.id]) markers[node.id].setIcon(makeIcon(node));
}

function renderAllMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  nodes.forEach(addMarker);
  updateSidebar();
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function updateSidebar() {
  const list = document.getElementById('trap-list');
  const sorted = [...nodes].sort((a,b) => a.id - b.id);
  list.innerHTML = sorted.map(n => `
    <div class="trap-item" onclick="panToNode(${n.id})">
      <div class="trap-dot" style="background:${intensityColor(n.intensity)}"></div>
      <span class="trap-id">#${n.id}</span>
      <span class="trap-intensity">${n.intensity}</span>
    </div>
  `).join('');
  document.getElementById('trap-count').textContent = nodes.length;
}

function panToNode(id) {
  const n = nodes.find(x => x.id === id);
  if (n && markers[id]) { map.panTo([n.lat, n.lng]); markers[id].openPopup(); }
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
const modal = document.getElementById('modal');
let selectedIntensity = 'None';

function nextAvailableId() {
  const used = new Set(nodes.map(n => n.id));
  let i = 1;
  while (used.has(i)) i++;
  return i;
}

function openModal(node) {
  modal.classList.add('open');
  document.getElementById('modal-title').textContent = node ? `Edit Trap #${node.id}` : 'New Trap';
  document.getElementById('modal-id').value = node ? node.id : nextAvailableId();
  document.getElementById('modal-delete').style.display = node ? 'block' : 'none';
  document.getElementById('id-error').classList.remove('show');
  document.getElementById('modal-id').classList.remove('error');
  selectedIntensity = normalizeIntensity(node && node.intensity);
  document.querySelectorAll('.intensity-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === selectedIntensity);
  });
}

function closeModal() {
  modal.classList.remove('open');
  document.getElementById('modal-delete-confirm').style.display = 'none';
  document.getElementById('modal-delete').style.display = 'none';
  document.getElementById('modal-save').style.display = 'block';
}

document.getElementById('modal-cancel').onclick = closeModal;
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

document.querySelectorAll('.intensity-btn').forEach(btn => {
  btn.onclick = () => {
    selectedIntensity = btn.dataset.val;
    document.querySelectorAll('.intensity-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
});

document.getElementById('modal-save').onclick = function() {
  const idInput = document.getElementById('modal-id');
  const newId = parseInt(idInput.value);
  const errEl = document.getElementById('id-error');

  if (!Number.isInteger(newId) || newId < 1) {
    idInput.classList.add('error');
    errEl.textContent = 'Must be a whole number greater than 0'; errEl.classList.add('show'); return;
  }

  // Conflict check (exclude self when editing)
  const conflict = nodes.find(n => n.id === newId && n.id !== editingId);
  if (conflict) {
    idInput.classList.add('error'); errEl.textContent = 'This ID already exists'; errEl.classList.add('show'); return;
  }
  idInput.classList.remove('error'); errEl.classList.remove('show');

  if (editingId !== null) {
    const n = nodes.find(x => x.id === editingId);
    if (n) {
      removeMarker(editingId);
      if (newId !== editingId) deleteNode(editingId);
      n.id = newId; n.intensity = selectedIntensity;
      delete markers[editingId];
      addMarker(n);
      pushNode(n);
    }
  } else {
    const node = { id: newId, intensity: selectedIntensity, lat: pendingLatLng.lat, lng: pendingLatLng.lng };
    nodes.push(node);
    addMarker(node);
    pushNode(node);
  }

  updateSidebar(); closeModal();
  stampSaved();
  toast(`Trap #${newId} saved`, 'success');
};

document.getElementById('modal-delete').onclick = function() {
  document.getElementById('modal-delete').style.display = 'none';
  document.getElementById('modal-delete-confirm').style.display = 'block';
  document.getElementById('modal-save').style.display = 'none';
};

document.getElementById('modal-delete-confirm').onclick = function() {
  const id = editingId;
  nodes = nodes.filter(n => n.id !== id);
  removeMarker(id);
  deleteNode(id);
  updateSidebar(); closeModal();
  toast(`Trap #${id} deleted`, 'success');
};

// ─────────────────────────────────────────────
// APPS SCRIPT API
// ─────────────────────────────────────────────
function setSyncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-status').textContent = msg;
}

function hideLoadingOverlay() {
  const el = document.getElementById('loading-overlay');
  if (el) el.classList.add('hidden');
}

async function fetchNodes() {
  if (!scriptUrl) { toast('No Script URL configured', 'error'); hideLoadingOverlay(); return; }
  setSyncStatus('loading', 'Loading…');
  try {
    const res = await fetch(scriptUrl + '?action=get');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    nodes = data.map(n => ({ ...n, intensity: normalizeIntensity(n.intensity) }));
    renderAllMarkers();
    const now = new Date().toLocaleTimeString();
    setSyncStatus('ok', `Loaded at ${now}`);
    document.getElementById('sb-sync').textContent = now;
    toast(`Loaded ${nodes.length} trap${nodes.length !== 1 ? 's' : ''}`, 'success');
  } catch(e) {
    setSyncStatus('err', 'Load failed');
    toast('Load failed: ' + e.message, 'error');
  } finally {
    hideLoadingOverlay();
  }
}

function stampSaved() {
  document.getElementById('sb-sync').textContent = new Date().toLocaleTimeString();
}

async function pushNode(node) {
  if (!scriptUrl || !node || !node.id || isNaN(node.lat) || isNaN(node.lng)) return;
  const params = new URLSearchParams({
    action: 'set',
    id: node.id,
    intensity: INTENSITY_LEVELS.indexOf(normalizeIntensity(node.intensity)),
    lat: node.lat,
    lng: node.lng
  });
  try {
    await fetch(`${scriptUrl}?${params}`);
  } catch(e) { /* CORS blocks response reading but write already happened */ }
}

async function deleteNode(id) {
  if (!scriptUrl) return;
  try {
    await fetch(`${scriptUrl}?action=delete&id=${id}`);
  } catch(e) { /* same as above */ }
}

// ─────────────────────────────────────────────
// CONFIG UI
// ─────────────────────────────────────────────
document.getElementById('btn-save-all').onclick = async function() {
  if (!nodes.length) { toast('No traps to save', ''); return; }
  this.disabled = true;
  await Promise.all(nodes.map(n => pushNode(n)));
  stampSaved();
  toast(`Saved ${nodes.length} trap${nodes.length !== 1 ? 's' : ''}`, 'success');
  this.disabled = false;
};

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadConfig();
if (scriptUrl) {
  fetchNodes();
} else {
  setSyncStatus('', 'Paste Script URL and save');
}
</script>
</body>
</html>
