<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amerige Heights Trap Map — Editor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .mode-badge {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 4px;
    background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3);
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--panel-w); background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
  }
  .trap-list { flex: 1; overflow-y: auto; padding: 8px; }
  .trap-list::-webkit-scrollbar { width: 4px; }
  .trap-list::-webkit-scrollbar-track { background: transparent; }
  .trap-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .trap-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: 6px; cursor: pointer; transition: background 0.1s; margin-bottom: 2px;
  }
  .trap-item:hover { background: var(--surface2); }
  .trap-item.selected { background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.3); }
  .trap-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .trap-id { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; flex: 1; }
  .trap-intensity { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim); }

  /* ── PIN gate ── */
  .pin-gate {
    position: fixed; inset: 0; z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,12,18,0.55);
    backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
    transition: opacity 0.3s;
  }
  .pin-gate.hidden { opacity: 0; pointer-events: none; }
  .pin-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 26px; width: 280px; text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .pin-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .pin-card p { font-size: 12px; color: var(--text-dim); margin-bottom: 18px; }
  .pin-input {
    width: 100%; box-sizing: border-box; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 22px;
    letter-spacing: 0.4em; text-align: center; outline: none; transition: border-color 0.15s;
  }
  .pin-input:focus { border-color: var(--accent); }
  .pin-input.error { border-color: var(--extreme-color); animation: shake 0.3s; }
  .pin-error { font-size: 11px; color: var(--extreme-color); margin-top: 10px; height: 14px; }
  .pin-error.checking { color: var(--text-dim); }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

  /* ── Popup / Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 320px; transform: translateY(8px); transition: transform 0.2s;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .modal-field input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px;
    outline: none; transition: border-color 0.15s;
  }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-field input.error { border-color: var(--extreme-color); }
  .error-msg { font-size: 11px; color: var(--extreme-color); margin-top: 4px; display: none; }
  .error-msg.show { display: block; }
  .intensity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .intensity-btn {
    padding: 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-dim); font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    transition: all 0.15s; font-family: 'Syne', sans-serif; font-weight: 600;
  }
  .intensity-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .intensity-btn.active { color: #fff; }
  .intensity-btn[data-val="None"].active { background: var(--none-color); border-color: var(--none-color); }
  .intensity-btn[data-val="Light"].active { background: var(--light-color); border-color: var(--light-color); color: #111; }
  .intensity-btn[data-val="Moderate"].active { background: var(--medium-color); border-color: var(--medium-color); }
  .intensity-btn[data-val="Heavy"].active { background: var(--extreme-color); border-color: var(--extreme-color); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 9px; }

  /* Node popup on map */
  .popup-id { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .popup-intensity { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .popup-actions { display: flex; gap: 6px; }
  .popup-actions button { font-size: 10px; padding: 5px 10px; }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    header { padding: 0 12px; height: 44px; }
    .logo { font-size: 12px; }
    .header-actions button { font-size: 10px; padding: 5px 10px; }
    .statusbar { padding: 0 10px; gap: 10px; }
    .status-item { font-size: 9px; }
    .modal { width: calc(100vw - 32px); padding: 18px; }
  }
</style>
</head>
<body>

<div id="pin-gate" class="pin-gate">
  <div class="pin-card">
    <h3>Editor Locked</h3>
    <p>Enter the PIN to edit the map.</p>
    <input id="pin-input" class="pin-input" type="password" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="••••" />
    <div id="pin-error" class="pin-error"></div>
  </div>
</div>

<header>
  <div class="logo">Amerige Heights <span>Trap Map</span></div>
  <div class="mode-badge">Edit Mode</div>
  <div class="header-actions">
    <button class="btn-success" id="btn-save-all">↑ Save Map</button>
    <button class="btn-ghost" onclick="window.open('view.html','_blank')">View Client Map ↗</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <!-- Sync status -->
    <div class="sidebar-section">
      <div style="display:flex;align-items:center;">
        <span class="sync-dot" id="sync-dot"></span>
        <span class="status-item" id="sync-status">Connecting…</span>
      </div>
    </div>


    <!-- Trap list -->
    <div class="sidebar-label" style="padding:12px 16px 4px;">Traps <span id="trap-count" style="color:var(--accent)">0</span></div>
    <div class="trap-list" id="trap-list"></div>

    <div style="padding:12px 16px;margin-top:auto;">
      <div class="sidebar-label" style="margin-bottom:8px;">Marker Size</div>
      <input id="marker-size" type="range" min="12" max="52" step="2" style="width:100%;" />
    </div>

    <div style="padding:0 16px 16px;">
      <img src="Assets/Images/bug-bouncer-logo.png" style="width:100%;opacity:0.85;" />
    </div>
  </div>

  <div style="position:relative;flex:1;display:flex;flex-direction:column;">
    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading…</div>
    </div>
    <div id="map"></div>
  </div>
</div>

<div class="statusbar">
<div class="status-item">Last saved: <span id="sb-sync">—</span></div>
  <div class="status-item" id="sb-coords" style="margin-left:auto;">Click map to place trap</div>
</div>

<!-- Node Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">New Trap</h3>
    <div class="modal-field">
      <label>Trap ID (number)</label>
      <input type="number" id="modal-id" min="1" placeholder="e.g. 42" />
      <div class="error-msg" id="id-error">This ID already exists</div>
    </div>
    <div class="modal-field">
      <label>Activity Level</label>
      <div class="intensity-grid">
        <button class="intensity-btn active" data-val="None">None</button>
        <button class="intensity-btn" data-val="Light">Light</button>
        <button class="intensity-btn" data-val="Moderate">Moderate</button>
        <button class="intensity-btn" data-val="Heavy">Heavy</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn-danger" id="modal-delete" style="display:none">Delete</button>
      <button class="btn-danger" id="modal-delete-confirm" style="display:none">Confirm Delete</button>
      <button class="btn-primary" id="modal-save">Save Trap</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="shared.js"></script>
<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let nodes = [];
let markers = {};
let editingId = null;
let pendingLatLng = null;

// ─────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────
const { map } = createTrapMap('map');

// Click map to place node
map.on('click', function(e) {
  if (e.originalEvent._fromMarker) return;
  const { lat, lng } = e.latlng;
  if (lat < 0 || lat > IMG_H || lng < 0 || lng > IMG_W) return;
  pendingLatLng = e.latlng;
  editingId = null;
  openModal(null);
});

map.on('mousemove', function(e) {
  document.getElementById('sb-coords').textContent =
    `x: ${e.latlng.lng.toFixed(1)}  y: ${e.latlng.lat.toFixed(1)}`;
});

// ─────────────────────────────────────────────
// MARKERS
// ─────────────────────────────────────────────
// Resize existing markers in place (no re-add, so popups/drag state survive)
function applyMarkerSize() {
  nodes.forEach(n => { if (markers[n.id]) markers[n.id].setIcon(makeIcon(n)); });
}
initMarkerSizeSlider(applyMarkerSize);

function addMarker(node) {
  const marker = L.marker([node.lat, node.lng], {
    icon: makeIcon(node), draggable: true, autoPanOnFocus: false
  }).addTo(map);

  marker.on('click', function(e) {
    e.originalEvent._fromMarker = true;
    editingId = node.id;
    pendingLatLng = null;
    openModal(node);
  });

  marker.on('dragend', function(e) {
    const ll = e.target.getLatLng();
    const clampedLat = Math.max(0, Math.min(IMG_H, ll.lat));
    const clampedLng = Math.max(0, Math.min(IMG_W, ll.lng));
    if (clampedLat !== ll.lat || clampedLng !== ll.lng) {
      e.target.setLatLng([clampedLat, clampedLng]);
    }
    const currentId = Object.keys(markers).find(k => markers[k] === e.target);
    const n = nodes.find(x => x.id === parseInt(currentId));
    if (n) { n.lat = clampedLat; n.lng = clampedLng; pushNode(n); stampSaved(); toast(`Trap #${n.id} saved`, 'success'); }
  });

  markers[node.id] = marker;
}

function removeMarker(id) {
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
}

function renderAllMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  nodes.forEach(addMarker);
  updateSidebar();
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function updateSidebar() {
  const list = document.getElementById('trap-list');
  const sorted = [...nodes].sort((a,b) => a.id - b.id);
  list.innerHTML = sorted.map(n => `
    <div class="trap-item" onclick="panToNode(${n.id})">
      <div class="trap-dot" style="background:${intensityColor(n.intensity)}"></div>
      <span class="trap-id">#${n.id}</span>
      <span class="trap-intensity">${n.intensity}</span>
    </div>
  `).join('');
  document.getElementById('trap-count').textContent = nodes.length;
}

function panToNode(id) {
  const n = nodes.find(x => x.id === id);
  if (n && markers[id]) { map.panTo([n.lat, n.lng]); markers[id].openPopup(); }
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
const modal = document.getElementById('modal');
let selectedIntensity = 'None';

function nextAvailableId() {
  const used = new Set(nodes.map(n => n.id));
  let i = 1;
  while (used.has(i)) i++;
  return i;
}

function openModal(node) {
  modal.classList.add('open');
  document.getElementById('modal-title').textContent = node ? `Edit Trap #${node.id}` : 'New Trap';
  document.getElementById('modal-id').value = node ? node.id : nextAvailableId();
  document.getElementById('modal-delete').style.display = node ? 'block' : 'none';
  document.getElementById('id-error').classList.remove('show');
  document.getElementById('modal-id').classList.remove('error');
  selectedIntensity = normalizeIntensity(node && node.intensity);
  document.querySelectorAll('.intensity-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === selectedIntensity);
  });
}

function closeModal() {
  modal.classList.remove('open');
  document.getElementById('modal-delete-confirm').style.display = 'none';
  document.getElementById('modal-delete').style.display = 'none';
  document.getElementById('modal-save').style.display = 'block';
}

document.getElementById('modal-cancel').onclick = closeModal;
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

document.querySelectorAll('.intensity-btn').forEach(btn => {
  btn.onclick = () => {
    selectedIntensity = btn.dataset.val;
    document.querySelectorAll('.intensity-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  };
});

document.getElementById('modal-save').onclick = function() {
  const idInput = document.getElementById('modal-id');
  const newId = parseInt(idInput.value);
  const errEl = document.getElementById('id-error');

  if (!Number.isInteger(newId) || newId < 1) {
    idInput.classList.add('error');
    errEl.textContent = 'Must be a whole number greater than 0'; errEl.classList.add('show'); return;
  }

  // Conflict check (exclude self when editing)
  const conflict = nodes.find(n => n.id === newId && n.id !== editingId);
  if (conflict) {
    idInput.classList.add('error'); errEl.textContent = 'This ID already exists'; errEl.classList.add('show'); return;
  }
  idInput.classList.remove('error'); errEl.classList.remove('show');

  if (editingId !== null) {
    const n = nodes.find(x => x.id === editingId);
    if (n) {
      removeMarker(editingId);
      if (newId !== editingId) deleteNode(editingId);
      n.id = newId; n.intensity = selectedIntensity;
      delete markers[editingId];
      addMarker(n);
      pushNode(n);
    }
  } else {
    const node = { id: newId, intensity: selectedIntensity, lat: pendingLatLng.lat, lng: pendingLatLng.lng };
    nodes.push(node);
    addMarker(node);
    pushNode(node);
  }

  updateSidebar(); closeModal();
  stampSaved();
  toast(`Trap #${newId} saved`, 'success');
};

document.getElementById('modal-delete').onclick = function() {
  document.getElementById('modal-delete').style.display = 'none';
  document.getElementById('modal-delete-confirm').style.display = 'block';
  document.getElementById('modal-save').style.display = 'none';
};

document.getElementById('modal-delete-confirm').onclick = function() {
  const id = editingId;
  nodes = nodes.filter(n => n.id !== id);
  removeMarker(id);
  deleteNode(id);
  updateSidebar(); closeModal();
  toast(`Trap #${id} deleted`, 'success');
};

// ─────────────────────────────────────────────
// APPS SCRIPT API
// ─────────────────────────────────────────────
function setSyncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-status').textContent = msg;
}

// Ask the server to atomically replace a stale duplicate row's ID with a new
// one (delete + insert happen in a single locked Apps Script execution, so a
// second request can't land in between and see a half-finished state).
async function renameNode(oldId, node) {
  if (!SCRIPT_URL) return;
  const params = new URLSearchParams({
    action: 'rename',
    oldId: oldId,
    id: node.id,
    intensity: INTENSITY_LEVELS.indexOf(normalizeIntensity(node.intensity)),
    lat: node.lat,
    lng: node.lng,
    pin: getEditPin()
  });
  try {
    await fetch(`${SCRIPT_URL}?${params}`);
  } catch(e) { /* CORS blocks response reading but write already happened */ }
}

// Write duplicate-resolution fixes back to the sheet: a real duplicate
// (different position) gets renamed atomically via renameNode; an exact
// accidental repeat (same position) just gets its stale row deleted.
async function persistDuplicateFixes(fixes) {
  if (!getEditPin()) return;  // not authenticated yet — try again on a later load
  for (const f of fixes) {
    if (f.renamedTo) await renameNode(f.staleId, f.renamedTo);
    else await deleteNode(f.staleId);
  }
}

async function fetchNodes() {
  if (!SCRIPT_URL) { toast('No Script URL configured', 'error'); hideLoadingOverlay(); return; }
  setSyncStatus('loading', 'Loading…');
  try {
    const mapped = await fetchTrapData(SCRIPT_URL);
    const { resolved, fixes } = resolveDuplicates(mapped);
    nodes = resolved;
    if (fixes.length) {
      const renamedCount = fixes.filter(f => f.renamedTo).length;
      const msg = renamedCount
        ? `⚠ Fixed ${fixes.length} duplicate trap ID(s) — ${renamedCount} renumbered`
        : `⚠ Removed ${fixes.length} duplicate trap ID(s)`;
      toast(msg, '');
      persistDuplicateFixes(fixes);
    }
    renderAllMarkers();
    const now = new Date().toLocaleTimeString();
    setSyncStatus('ok', `Loaded at ${now}`);
    document.getElementById('sb-sync').textContent = now;
    toast(`Loaded ${nodes.length} trap${nodes.length !== 1 ? 's' : ''}`, 'success');
  } catch(e) {
    setSyncStatus('err', 'Load failed');
    toast('Load failed: ' + e.message, 'error');
  } finally {
    hideLoadingOverlay();
  }
}

function stampSaved() {
  document.getElementById('sb-sync').textContent = new Date().toLocaleTimeString();
}

async function pushNode(node) {
  if (!SCRIPT_URL || !node || !node.id || isNaN(node.lat) || isNaN(node.lng)) return;
  const params = new URLSearchParams({
    action: 'set',
    id: node.id,
    intensity: INTENSITY_LEVELS.indexOf(normalizeIntensity(node.intensity)),
    lat: node.lat,
    lng: node.lng,
    pin: getEditPin()
  });
  try {
    await fetch(`${SCRIPT_URL}?${params}`);
  } catch(e) { /* CORS blocks response reading but write already happened */ }
}

async function deleteNode(id) {
  if (!SCRIPT_URL) return;
  try {
    await fetch(`${SCRIPT_URL}?action=delete&id=${id}&pin=${encodeURIComponent(getEditPin())}`);
  } catch(e) { /* same as above */ }
}

// ─────────────────────────────────────────────
// SAVE-ALL BUTTON
// ─────────────────────────────────────────────
document.getElementById('btn-save-all').onclick = async function() {
  if (!nodes.length) { toast('No traps to save', ''); return; }
  this.disabled = true;
  await Promise.all(nodes.map(n => pushNode(n)));
  stampSaved();
  toast(`Saved ${nodes.length} trap${nodes.length !== 1 ? 's' : ''}`, 'success');
  this.disabled = false;
};

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
if (SCRIPT_URL) {
  fetchNodes();
} else {
  setSyncStatus('', 'Paste Script URL and save');
}

// ─────────────────────────────────────────────
// EDITOR PIN GATE
// The PIN is validated server-side by Apps Script (action=auth), which
// checks it against the EDIT_PIN Script Property. Nothing about the PIN
// lives in this file or the public repo. On success the entered PIN and an
// expiry timestamp are kept in localStorage (~30 days) so the same browser
// isn't re-prompted every visit, and it's attached to every save/delete so
// writes are also enforced server-side — not just the UI. The map loads
// behind the gate regardless of lock state.
// ─────────────────────────────────────────────
const PIN_REMEMBER_KEY = 'trapmap_pin_auth';
const PIN_REMEMBER_MS  = 30 * 24 * 60 * 60 * 1000; // 30 days

function getEditPin() {
  try {
    const saved = JSON.parse(localStorage.getItem(PIN_REMEMBER_KEY) || 'null');
    if (saved && saved.expires > Date.now()) return saved.pin;
  } catch (e) { /* ignore malformed value */ }
  return '';
}

(function() {
  const gate  = document.getElementById('pin-gate');
  const input = document.getElementById('pin-input');
  const errEl = document.getElementById('pin-error');

  function unlock() { gate.classList.add('hidden'); }
  if (getEditPin()) { unlock(); return; }
  localStorage.removeItem(PIN_REMEMBER_KEY);  // clear any expired entry

  input.focus();
  let checking = false;

  async function check() {
    const val = input.value.trim();
    if (!val || checking) return;
    checking = true;
    errEl.textContent = 'Checking…';
    errEl.classList.add('checking');
    try {
      const res = await fetch(`${SCRIPT_URL}?action=auth&pin=${encodeURIComponent(val)}`);
      const data = await res.json();
      if (data.ok) {
        localStorage.setItem(PIN_REMEMBER_KEY, JSON.stringify({ pin: val, expires: Date.now() + PIN_REMEMBER_MS }));
        unlock();
      } else {
        errEl.classList.remove('checking');
        input.classList.add('error');
        errEl.textContent = 'Incorrect PIN';
        input.value = '';
        setTimeout(() => input.classList.remove('error'), 400);
      }
    } catch (err) {
      errEl.classList.remove('checking');
      errEl.textContent = 'Connection error — try again';
    } finally {
      checking = false;
    }
  }

  input.addEventListener('input', () => {
    if (checking) return;
    errEl.textContent = '';
    if (input.value.length >= 4) check();  // current PIN is 4 digits
  });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
})();
</script>
</body>
