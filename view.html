<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amerige Heights Trap Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2535;
    --border: #2a3047;
    --accent: #4f8ef7;
    --text: #e8eaf0;
    --text-dim: #6b7494;
    --none-color: #40d080;
    --light-color: #f0c040;
    --medium-color: #f07030;
    --extreme-color: #e03040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 52px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 1000;
  }
  .logo { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
  .logo span { color: var(--accent); }
  .mode-badge {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 4px;
    background: rgba(40,200,100,0.1); color: #40d080; border: 1px solid rgba(40,200,100,0.25);
  }

  button {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    border: none; border-radius: 6px; padding: 7px 14px; transition: all 0.15s;
  }
  .btn-success { background: rgba(40,200,100,0.15); color: #40d080; border: 1px solid rgba(40,200,100,0.3); }
  .btn-success:hover { background: rgba(40,200,100,0.3); }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Legend panel */
  .legend-panel {
    width: 280px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; padding: 16px;
    gap: 6px; overflow-y: auto;
  }
  .legend-label-header {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-text { font-size: 13px; }

  /* Summary counts */
  .count-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 16px; }
  .count-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 8px; text-align: center;
  }
  .count-num { font-size: 22px; font-weight: 800; font-family: 'DM Mono', monospace; }
  .count-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  #map { flex: 1; height: 100%; background: #0a0c12; }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 8px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 14px 16px !important; font-family: 'Syne', sans-serif; min-width: 120px; }
  .popup-id { font-size: 24px; font-weight: 800; margin-bottom: 2px; }
  .popup-intensity {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 4px;
    display: inline-block; margin-top: 4px; color: #fff;
  }

  .statusbar {
    height: 28px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0;
  }
  .status-item { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }
  .status-item span { color: var(--text); }

  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); display: inline-block; margin-right: 5px; }
  .sync-dot.ok { background: #40d080; }
  .sync-dot.err { background: var(--extreme-color); }
  .sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 18px; font-size: 13px; z-index: 9999; opacity: 0;
    transition: all 0.25s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #40d080; color: #40d080; }
  .toast.error { border-color: var(--extreme-color); color: var(--extreme-color); }

  @media (max-width: 600px) {
    .legend-panel { width: 140px; padding: 10px; font-size: 11px; }
    .count-num { font-size: 16px; }
    .count-lbl { font-size: 8px; }
    header { padding: 0 12px; height: 44px; }
    .logo { font-size: 12px; }
    .statusbar { padding: 0 10px; gap: 8px; }
    .status-item { font-size: 9px; }
  }

  .loading-overlay {
    position: absolute; inset: 0; background: rgba(10,12,18,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; flex-direction: column; gap: 14px;
    transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }
</style>
</head>
<body>

<header>
  <div class="logo">Amerige Heights <span>Trap Map</span></div>
</header>

<div class="main">
  <div class="legend-panel">
    <div class="legend-label-header">Summary</div>
    <div class="count-grid">
      <div class="count-card" style="grid-column:1 / -1;"><div class="count-num" id="cnt-total">0</div><div class="count-lbl">Total Traps</div></div>
      <div class="count-card"><div class="count-num" id="cnt-none" style="color:var(--none-color)">0</div><div class="count-lbl">None</div></div>
      <div class="count-card"><div class="count-num" id="cnt-light" style="color:var(--light-color)">0</div><div class="count-lbl">Light</div></div>
      <div class="count-card"><div class="count-num" id="cnt-moderate" style="color:var(--medium-color)">0</div><div class="count-lbl">Moderate</div></div>
      <div class="count-card"><div class="count-num" id="cnt-heavy" style="color:var(--extreme-color)">0</div><div class="count-lbl">Heavy</div></div>
    </div>

    <div style="margin-top:auto;">
      <img src="Assets/Images/bug-bouncer-logo.png" style="width:100%;opacity:0.85;" />
    </div>
  </div>

  <div style="position:relative;flex:1;display:flex;flex-direction:column;">
    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading map…</div>
    </div>
    <div id="map"></div>
  </div>
</div>

<div class="statusbar">
  <div class="status-item">Total traps: <span id="sb-count">—</span></div>
  <div class="status-item">Last updated: <span id="sb-sync">—</span></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STORAGE_KEY = 'compoundmap_nodes';
const CONFIG_KEY  = 'compoundmap_config';
const INTENSITY_COLORS = {
  None: '#40d080', Light: '#f0c040', Moderate: '#f07030', Heavy: '#e03040'
};

// Sheet data may hold numeric levels (0-3) or any casing
const INTENSITY_LEVELS = ['None', 'Light', 'Moderate', 'Heavy'];
const LEGACY_INTENSITY = { Medium: 'Moderate', Extreme: 'Heavy' };
function normalizeIntensity(val) {
  if (val === undefined || val === null || val === '') return 'None';
  const s = String(val).trim();
  if (INTENSITY_LEVELS[Number(s)] !== undefined && s !== '' && !isNaN(s)) return INTENSITY_LEVELS[Number(s)];
  const cap = s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
  if (LEGACY_INTENSITY[cap]) return LEGACY_INTENSITY[cap];
  return INTENSITY_LEVELS.includes(cap) ? cap : 'None';
}

let nodes = [];
let markers = {};
const sheetUrl = 'https://script.google.com/macros/s/AKfycbyIwaoWbDzwdTkr4XpQBxb1vSeZ9x361JdAoxagH5Y6ZkaPcONfimDh4Yl179FOv_wuLw/exec';

// ── Map init ──────────────────────────────────
const IMG_URL = 'Assets/Images/AMERIGE_HEIGHTS_COMMUNITY.jpg';
const IMG_W = 1625, IMG_H = 1042;

const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 4, zoomSnap: 0.25 });
const bounds = [[0,0],[IMG_H,IMG_W]];
const overlay = L.imageOverlay(IMG_URL, bounds).addTo(map);
map.fitBounds(bounds);

function hideLoadingOverlay() {
  const el = document.getElementById('loading-overlay');
  if (el) el.classList.add('hidden');
}

// ── Load config (script URL) from localStorage ────
function loadConfig() {}

// ── Markers ──────────────────────────────────
function makeIcon(node) {
  const color = INTENSITY_COLORS[node.intensity] || INTENSITY_COLORS.none;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="15" fill="${color}" stroke="#fff" stroke-width="2.5" opacity="0.92"/>
    <text x="18" y="23" text-anchor="middle" font-size="12" font-weight="700" font-family="Syne,sans-serif" fill="#fff">${node.id}</text>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0,-22] });
}

function intensityBadgeStyle(intensity) {
  const colors = { none: '#6b7494', light: '#c09020', moderate: '#c05010', heavy: '#b02030' };
  return `background:${colors[intensity] || '#6b7494'}`;
}

function renderAllMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  nodes.forEach(node => {
    const marker = L.marker([node.lat, node.lng], { icon: makeIcon(node) }).addTo(map);
    markers[node.id] = marker;
  });
  updateCounts();
  document.getElementById('sb-count').textContent = nodes.length;
}

function updateCounts() {
  document.getElementById('cnt-total').textContent = nodes.length;
  ['None','Light','Moderate','Heavy'].forEach(k => {
    document.getElementById('cnt-' + k.toLowerCase()).textContent = nodes.filter(n => n.intensity === k).length;
  });
}

// ── Apps Script fetch ─────────────────────────
async function fetchNodes() {
  if (!sheetUrl) { hideLoadingOverlay(); return; }
  try {
    const res = await fetch(sheetUrl + '?action=get');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    nodes = data.map(n => ({ ...n, intensity: normalizeIntensity(n.intensity) }));
    renderAllMarkers();
    document.getElementById('sb-sync').textContent = new Date().toLocaleTimeString();
  } catch(e) {
    toast('Load failed: ' + e.message, 'error');
  } finally {
    hideLoadingOverlay();
  }
}


// ── Toast ─────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────
loadConfig();
fetchNodes();
</script>
</body>
</html>
