<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Compound Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2535;
    --border: #2a3047;
    --accent: #4f8ef7;
    --text: #e8eaf0;
    --text-dim: #6b7494;
    --none-color: #6b7494;
    --light-color: #f0c040;
    --medium-color: #f07030;
    --extreme-color: #e03040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 52px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 1000;
  }
  .logo { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
  .logo span { color: var(--accent); }
  .mode-badge {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 4px;
    background: rgba(40,200,100,0.1); color: #40d080; border: 1px solid rgba(40,200,100,0.25);
  }

  button {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    border: none; border-radius: 6px; padding: 7px 14px; transition: all 0.15s;
  }
  .btn-success { background: rgba(40,200,100,0.15); color: #40d080; border: 1px solid rgba(40,200,100,0.3); }
  .btn-success:hover { background: rgba(40,200,100,0.3); }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Legend panel */
  .legend-panel {
    width: 200px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; padding: 16px;
    gap: 6px;
  }
  .legend-label-header {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-text { font-size: 13px; }

  /* Summary counts */
  .count-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 16px; }
  .count-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 8px; text-align: center;
  }
  .count-num { font-size: 22px; font-weight: 800; font-family: 'DM Mono', monospace; }
  .count-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  #map { flex: 1; background: #0a0c12; }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 8px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 14px 16px !important; font-family: 'Syne', sans-serif; min-width: 120px; }
  .popup-id { font-size: 24px; font-weight: 800; margin-bottom: 2px; }
  .popup-intensity {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'DM Mono', monospace; padding: 3px 8px; border-radius: 4px;
    display: inline-block; margin-top: 4px; color: #fff;
  }

  .statusbar {
    height: 28px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 16px; flex-shrink: 0;
  }
  .status-item { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }
  .status-item span { color: var(--text); }

  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); display: inline-block; margin-right: 5px; }
  .sync-dot.ok { background: #40d080; }
  .sync-dot.err { background: var(--extreme-color); }
  .sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 18px; font-size: 13px; z-index: 9999; opacity: 0;
    transition: all 0.25s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #40d080; color: #40d080; }
  .toast.error { border-color: var(--extreme-color); color: var(--extreme-color); }

  .loading-overlay {
    position: absolute; inset: 0; background: rgba(15,17,23,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }
</style>
</head>
<body>

<header>
  <div class="logo">Compound<span>Map</span></div>
  <div class="mode-badge">Live View</div>
  <button class="btn-success" id="btn-update">⟳ Update Map</button>
</header>

<div class="main">
  <div class="legend-panel">
    <div class="legend-label-header">Intensity Legend</div>
    <div class="legend-row"><div class="legend-dot" style="background:var(--none-color)"></div><span class="legend-text">None</span></div>
    <div class="legend-row"><div class="legend-dot" style="background:var(--light-color)"></div><span class="legend-text">Light</span></div>
    <div class="legend-row"><div class="legend-dot" style="background:var(--medium-color)"></div><span class="legend-text">Medium</span></div>
    <div class="legend-row"><div class="legend-dot" style="background:var(--extreme-color)"></div><span class="legend-text">Extreme</span></div>

    <hr class="divider"/>

    <div class="legend-label-header">Summary</div>
    <div class="count-grid">
      <div class="count-card"><div class="count-num" id="cnt-none" style="color:var(--none-color)">0</div><div class="count-lbl">None</div></div>
      <div class="count-card"><div class="count-num" id="cnt-light" style="color:var(--light-color)">0</div><div class="count-lbl">Light</div></div>
      <div class="count-card"><div class="count-num" id="cnt-medium" style="color:var(--medium-color)">0</div><div class="count-lbl">Medium</div></div>
      <div class="count-card"><div class="count-num" id="cnt-extreme" style="color:var(--extreme-color)">0</div><div class="count-lbl">Extreme</div></div>
    </div>

    <hr class="divider"/>

    <div class="status-item" style="display:flex;align-items:center;margin-top:4px;">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-status" style="font-size:10px;">Loading…</span>
    </div>
  </div>

  <div style="position:relative;flex:1;">
    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading map…</div>
    </div>
    <div id="map"></div>
  </div>
</div>

<div class="statusbar">
  <div class="status-item">Total nodes: <span id="sb-count">—</span></div>
  <div class="status-item">Last updated: <span id="sb-sync">—</span></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STORAGE_KEY = 'compoundmap_nodes';
const CONFIG_KEY  = 'compoundmap_config';
const INTENSITY_COLORS = {
  none: '#6b7494', light: '#f0c040', medium: '#f07030', extreme: '#e03040'
};

let nodes = [];
let markers = {};
let sheetUrl = '';

// ── Map init ──────────────────────────────────
const IMG_URL = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Gatto_europeo4.jpg/800px-Gatto_europeo4.jpg'; // PLACEHOLDER
const IMG_W = 800, IMG_H = 600;

const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 4, zoomSnap: 0.25 });
const bounds = [[0,0],[IMG_H,IMG_W]];
L.imageOverlay(IMG_URL, bounds).addTo(map);
map.fitBounds(bounds);

document.getElementById('loading-overlay').style.display = 'none';

// ── Load state from localStorage (shared with editor) ────
function loadConfig() {
  try { const c = JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; sheetUrl = c.sheetUrl || ''; } catch(e) {}
}
function loadNodes() {
  try { nodes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { nodes = []; }
}
function saveNodes() { localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes)); }

// ── Markers ──────────────────────────────────
function makeIcon(node) {
  const color = INTENSITY_COLORS[node.intensity] || INTENSITY_COLORS.none;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="15" fill="${color}" stroke="#fff" stroke-width="2.5" opacity="0.92"/>
    <text x="18" y="23" text-anchor="middle" font-size="12" font-weight="700" font-family="Syne,sans-serif" fill="#fff">${node.id}</text>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0,-22] });
}

function intensityBadgeStyle(intensity) {
  const colors = { none: '#6b7494', light: '#c09020', medium: '#c05010', extreme: '#b02030' };
  return `background:${colors[intensity] || '#6b7494'}`;
}

function renderAllMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  nodes.forEach(node => {
    const marker = L.marker([node.lat, node.lng], { icon: makeIcon(node) }).addTo(map);
    marker.bindPopup(`
      <div class="popup-id">#${node.id}</div>
      <div><span class="popup-intensity" style="${intensityBadgeStyle(node.intensity)}">${node.intensity}</span></div>
    `);
    markers[node.id] = marker;
  });
  updateCounts();
  document.getElementById('sb-count').textContent = nodes.length;
}

function updateCounts() {
  ['none','light','medium','extreme'].forEach(k => {
    document.getElementById('cnt-' + k).textContent = nodes.filter(n => n.intensity === k).length;
  });
}

// ── Sheet sync ────────────────────────────────
function setSyncStatus(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-status').textContent = msg;
}

function parseCSV(text) {
  return text.split('\n').filter(r => r.trim()).map(row => {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < row.length; i++) {
      if (row[i] === '"') { inQ = !inQ; }
      else if (row[i] === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += row[i]; }
    }
    result.push(cur.trim()); return result;
  });
}

async function updateFromSheet() {
  if (!sheetUrl) { toast('No Sheet URL — ask the editor to configure it', 'error'); return; }
  setSyncStatus('loading', 'Syncing…');
  try {
    const url = sheetUrl.includes('?') ? sheetUrl + '&t=' + Date.now() : sheetUrl + '?t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Sheet appears empty');

    const headers = rows[0].map(h => h.trim().toLowerCase());
    const idCol = headers.findIndex(h => h === 'id');
    const intCol = headers.findIndex(h => h.includes('intensity'));
    if (idCol === -1 || intCol === -1) throw new Error('Missing ID or Intensity columns');

    let updated = 0;
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const id = parseInt(row[idCol]);
      const intensity = (row[intCol] || '').trim().toLowerCase();
      if (!id || !INTENSITY_COLORS[intensity]) continue;
      const n = nodes.find(x => x.id === id);
      if (n && n.intensity !== intensity) { n.intensity = intensity; updated++; }
    }

    saveNodes(); renderAllMarkers();
    const now = new Date().toLocaleTimeString();
    setSyncStatus('ok', `Synced ${now}`);
    document.getElementById('sb-sync').textContent = now;
    toast(`${updated} node${updated !== 1 ? 's' : ''} updated`, 'success');
  } catch(e) {
    setSyncStatus('err', 'Sync failed');
    toast('Sync failed: ' + e.message, 'error');
  }
}

document.getElementById('btn-update').onclick = updateFromSheet;

// ── Toast ─────────────────────────────────────
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────
loadConfig();
loadNodes();
renderAllMarkers();
setSyncStatus(nodes.length ? 'ok' : '', nodes.length ? 'Loaded from cache' : 'No data yet');
</script>
</body>
</html>
